<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Risk GoT – Misiones Secretas</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #09090f; }
      .rg-wrap { width: 90%; max-width: 520px; margin: 0 auto; padding: 28px 0; }
      .rg-pass { width: 100%; max-width: 380px; }
      .rg-card { width: 100%; max-width: 300px; }
      .rg-btn  { width: 100%; max-width: 340px; }
      @media (min-width: 768px) {
        .rg-wrap { max-width: 700px; padding: 40px 0; }
        .rg-pass { max-width: 560px; }
        .rg-card { max-width: 460px; }
        .rg-btn  { max-width: 460px; }
      }
      @media (min-width: 1100px) {
        .rg-wrap { max-width: 900px; padding: 56px 0; }
        .rg-pass { max-width: 680px; }
        .rg-card { max-width: 540px; }
        .rg-btn  { max-width: 540px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
